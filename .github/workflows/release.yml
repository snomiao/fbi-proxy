name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build proxy binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: static musl, cross-compiled on ubuntu (free on public repos).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: fbi-proxy-linux-x64
            zig: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_name: fbi-proxy-linux-arm64
            zig: true
          # macOS: cross-compiled from ubuntu via cargo-zigbuild + the macOS SDK
          # (the `notify` crate links CoreFoundation/CoreServices via FSEvents).
          # No macOS runner (10x billing) needed.
          - os: ubuntu-latest
            target: x86_64-apple-darwin
            binary_name: fbi-proxy-macos-x64
            zig: true
          - os: ubuntu-latest
            target: aarch64-apple-darwin
            binary_name: fbi-proxy-macos-arm64
            zig: true
          # Windows: keep MSVC on a windows runner (2x, reliable for ring).
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: fbi-proxy-windows-x64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary_name: fbi-proxy-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Zig (cross-compiler used by cargo-zigbuild)
        if: matrix.zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.zig
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Fetch macOS SDK (frameworks for cargo-zigbuild)
        if: contains(matrix.target, 'apple-darwin')
        run: |
          curl -sSL https://github.com/joseluisq/macosx-sdks/releases/download/15.5/MacOSX15.5.sdk.tar.xz | tar -xJ
          echo "SDKROOT=$PWD/MacOSX15.5.sdk" >> "$GITHUB_ENV"

      - name: Build binary (cross via zig)
        if: matrix.zig
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build binary (native)
        if: ${{ !matrix.zig }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/fbi-proxy.exe release/${{ matrix.binary_name }}
          else
            cp target/${{ matrix.target }}/release/fbi-proxy release/${{ matrix.binary_name }}
            chmod +x release/${{ matrix.binary_name }}
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: release/${{ matrix.binary_name }}

  release:
    name: Semantic Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.repository_owner == 'snomiao'
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
      - run: bun install
      # dont build rs here
      - run: bun run build:ts
      - run: bun run build:js

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Flatten artifacts
        run: |
          mkdir -p release-flat
          find release -type f -exec cp {} release-flat/ \;
          ls -la release-flat/
          rm -rf release
          mv release-flat release

      - name: Set execute permissions for binaries
        run: |
          chmod +x release/fbi-proxy-linux-x64 || true
          chmod +x release/fbi-proxy-linux-arm64 || true
          chmod +x release/fbi-proxy-macos-x64 || true
          chmod +x release/fbi-proxy-macos-arm64 || true
          ls -la release/

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bunx semantic-release
